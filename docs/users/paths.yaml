/:
  get:
    summary: Get all users (Paginated)
    tags:
      - Users
    operationId: listUsers
    security:
      - bearerAuth: []
    parameters:
      - $ref: '../common/shared.yaml#/components/parameters/page'
      - $ref: '../common/shared.yaml#/components/parameters/limit'
      - $ref: '../common/shared.yaml#/components/parameters/sortBy'
      - $ref: '../common/shared.yaml#/components/parameters/sortOrder'
      - $ref: '../common/shared.yaml#/components/parameters/search'
    responses:
      '200':
        description: A list of users
        content:
          application/json:
            schema:
              $ref: './schemas.yaml#/UserListResponse'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../common/shared.yaml#/components/schemas/ErrorResponse'

  post:
    summary: Create a new user
    tags:
      - Users
    operationId: createUser
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: './schemas.yaml#/UserCreate'
    responses:
      '201':
        description: User created successfully
        content:
          application/json:
            schema:
              $ref: './schemas.yaml#/UserResponse'
      '400':
        description: Validation error
        content:
          application/json:
            schema:
              $ref: '../common/shared.yaml#/components/schemas/ErrorResponse'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../common/shared.yaml#/components/schemas/ErrorResponse'

/{id}:
  get:
    summary: Get a user by ID
    tags:
      - Users
    operationId: getUserById
    security:
      - bearerAuth: []
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '200':
        description: The user
        content:
          application/json:
            schema:
              $ref: './schemas.yaml#/UserResponse'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../common/shared.yaml#/components/schemas/ErrorResponse'
      '404':
        description: User not found
        content:
          application/json:
            schema:
              $ref: '../common/shared.yaml#/components/schemas/ErrorResponse'

  patch:
    summary: Update a user by ID
    tags:
      - Users
    operationId: updateUser
    security:
      - bearerAuth: []
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
          format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: './schemas.yaml#/UserUpdate'
    responses:
      '200':
        description: User updated successfully
        content:
          application/json:
            schema:
              $ref: './schemas.yaml#/UserResponse'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../common/shared.yaml#/components/schemas/ErrorResponse'
      '404':
        description: User not found
        content:
          application/json:
            schema:
              $ref: '../common/shared.yaml#/components/schemas/ErrorResponse'
        
  delete:
    summary: Delete a user by ID
    tags:
      - Users
    operationId: deleteUser
    security:
      - bearerAuth: []
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '200':
        description: User deleted successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                message:
                  type: string
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../common/shared.yaml#/components/schemas/ErrorResponse'
      '404':
        description: User not found
        content:
          application/json:
            schema:
              $ref: '../common/shared.yaml#/components/schemas/ErrorResponse'
