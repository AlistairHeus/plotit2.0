/: 
  post:
    tags:
      - Races
    summary: Create a new race
    description: Creates a new race within a universe.
    operationId: createRace
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: './schemas.yaml#/RaceCreate'
    responses:
      '201':
        description: Race created successfully
        content:
          application/json:
            schema:
              $ref: './schemas.yaml#/RaceResponse'
      '400':
        description: Validation error
        content:
          application/json:
            schema:
              $ref: '../common/shared.yaml#/components/schemas/ErrorResponse'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../common/shared.yaml#/components/schemas/ErrorResponse'

  get:
    tags:
      - Races
    summary: Get all races
    description: Retrieves a paginated list of races. Filter by universe using query params.
    operationId: listRaces
    security:
      - bearerAuth: []
    parameters:
      - $ref: '../common/shared.yaml#/components/parameters/page'
      - $ref: '../common/shared.yaml#/components/parameters/limit'
      - $ref: '../common/shared.yaml#/components/parameters/sortBy'
      - $ref: '../common/shared.yaml#/components/parameters/sortOrder'
      - $ref: '../common/shared.yaml#/components/parameters/search'
      - name: name
        in: query
        schema:
          type: string
      - name: universeId
        in: query
        schema:
          type: string
          format: uuid
    responses:
      '200':
        description: A paginated list of races
        content:
          application/json:
            schema:
              $ref: './schemas.yaml#/RaceListResponse'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../common/shared.yaml#/components/schemas/ErrorResponse'

/{id}:
  get:
    tags:
      - Races
    summary: Get a race by ID
    description: Retrieves a single race by its UUID, including its universe and ethnic groups.
    operationId: getRaceById
    security:
      - bearerAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '200':
        description: Race retrieved successfully
        content:
          application/json:
            schema:
              $ref: './schemas.yaml#/RaceResponse'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../common/shared.yaml#/components/schemas/ErrorResponse'
      '404':
        description: Not found
        content:
          application/json:
            schema:
              $ref: '../common/shared.yaml#/components/schemas/ErrorResponse'

  put:
    tags:
      - Races
    summary: Update a race
    description: Updates an existing race by its ID.
    operationId: updateRace
    security:
      - bearerAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: './schemas.yaml#/RaceUpdate'
    responses:
      '200':
        description: Race updated successfully
        content:
          application/json:
            schema:
              $ref: './schemas.yaml#/RaceResponse'
      '400':
        description: Validation error
        content:
          application/json:
            schema:
              $ref: '../common/shared.yaml#/components/schemas/ErrorResponse'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../common/shared.yaml#/components/schemas/ErrorResponse'
      '404':
        description: Not found
        content:
          application/json:
            schema:
              $ref: '../common/shared.yaml#/components/schemas/ErrorResponse'

  delete:
    tags:
      - Races
    summary: Delete a race
    description: Deletes a race by its ID.
    operationId: deleteRace
    security:
      - bearerAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '200':
        description: Race deleted successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                message:
                  type: string
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../common/shared.yaml#/components/schemas/ErrorResponse'
      '404':
        description: Not found
        content:
          application/json:
            schema:
              $ref: '../common/shared.yaml#/components/schemas/ErrorResponse'

