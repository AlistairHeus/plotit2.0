/galaxies:
  get:
    summary: Get all galaxies
    tags: [Galaxies]
    operationId: listGalaxies
    security: [{bearerAuth: []}]
    parameters:
      - $ref: '../common/shared.yaml#/components/parameters/page'
      - $ref: '../common/shared.yaml#/components/parameters/limit'
      - $ref: '../common/shared.yaml#/components/parameters/sortBy'
      - $ref: '../common/shared.yaml#/components/parameters/sortOrder'
      - $ref: '../common/shared.yaml#/components/parameters/search'
      - in: query
        name: name
        schema: {type: string}
      - in: query
        name: universeId
        schema: {type: string, format: uuid}
      - in: query
        name: type
        schema: {type: string, enum: [SPIRAL, BARRED_SPIRAL, ELLIPTICAL, IRREGULAR, LENTICULAR, RING, DWARF]}
    responses:
      '200':
        description: A list of galaxies
        content:
          application/json:
            schema: {$ref: './schemas.yaml#/GalaxyListResponse'}
      '401':
        description: Unauthorized
        content:
          application/json:
            schema: {$ref: '../common/shared.yaml#/components/schemas/ErrorResponse'}

  post:
    summary: Create a new galaxy
    tags: [Galaxies]
    operationId: createGalaxy
    security: [{bearerAuth: []}]
    requestBody:
      required: true
      content:
        application/json:
          schema: {$ref: './schemas.yaml#/GalaxyCreate'}
    responses:
      '201':
        description: Galaxy created
        content:
          application/json:
            schema: {$ref: './schemas.yaml#/GalaxyResponse'}
      '400':
        description: Validation error
        content:
          application/json:
            schema: {$ref: '../common/shared.yaml#/components/schemas/ErrorResponse'}
      '401':
        description: Unauthorized
        content:
          application/json:
            schema: {$ref: '../common/shared.yaml#/components/schemas/ErrorResponse'}

/galaxies/{id}:
  get:
    summary: Get galaxy by ID
    tags: [Galaxies]
    operationId: getGalaxyById
    security: [{bearerAuth: []}]
    parameters:
      - in: path
        name: id
        required: true
        schema: {type: string, format: uuid}
    responses:
      '200':
        description: The galaxy
        content:
          application/json:
            schema: {$ref: './schemas.yaml#/GalaxyResponse'}
      '401':
        description: Unauthorized
        content:
          application/json:
            schema: {$ref: '../common/shared.yaml#/components/schemas/ErrorResponse'}
      '404':
        description: Galaxy not found
        content:
          application/json:
            schema: {$ref: '../common/shared.yaml#/components/schemas/ErrorResponse'}

  patch:
    summary: Update a galaxy
    tags: [Galaxies]
    operationId: updateGalaxy
    security: [{bearerAuth: []}]
    parameters:
      - in: path
        name: id
        required: true
        schema: {type: string, format: uuid}
    requestBody:
      required: true
      content:
        application/json:
          schema: {$ref: './schemas.yaml#/GalaxyUpdate'}
    responses:
      '200':
        description: Galaxy updated
        content:
          application/json:
            schema: {$ref: './schemas.yaml#/GalaxyResponse'}
      '400':
        description: Validation error
        content:
          application/json:
            schema: {$ref: '../common/shared.yaml#/components/schemas/ErrorResponse'}
      '401':
        description: Unauthorized
        content:
          application/json:
            schema: {$ref: '../common/shared.yaml#/components/schemas/ErrorResponse'}
      '404':
        description: Galaxy not found
        content:
          application/json:
            schema: {$ref: '../common/shared.yaml#/components/schemas/ErrorResponse'}

  delete:
    summary: Delete a galaxy
    tags: [Galaxies]
    operationId: deleteGalaxy
    security: [{bearerAuth: []}]
    parameters:
      - in: path
        name: id
        required: true
        schema: {type: string, format: uuid}
    responses:
      '200':
        description: Galaxy deleted
        content:
          application/json:
            schema:
              type: object
              properties:
                success: {type: boolean}
                message: {type: string}
      '401':
        description: Unauthorized
        content:
          application/json:
            schema: {$ref: '../common/shared.yaml#/components/schemas/ErrorResponse'}
      '404':
        description: Galaxy not found
        content:
          application/json:
            schema: {$ref: '../common/shared.yaml#/components/schemas/ErrorResponse'}

