/:
  get:
    summary: Get all regions
    tags:
      - Regions
    operationId: listRegions
    security:
      - bearerAuth: []
    parameters:
      - $ref: '../common/shared.yaml#/components/parameters/page'
      - $ref: '../common/shared.yaml#/components/parameters/limit'
      - $ref: '../common/shared.yaml#/components/parameters/sortBy'
      - $ref: '../common/shared.yaml#/components/parameters/sortOrder'
      - $ref: '../common/shared.yaml#/components/parameters/search'
      - in: query
        name: name
        description: Filter by region name
        schema:
          type: string
      - in: query
        name: universeId
        description: Filter by universe ID
        schema:
          type: string
          format: uuid
      - in: query
        name: planetId
        description: Filter by planet ID
        schema:
          type: string
          format: uuid
      - in: query
        name: parentId
        description: Filter by parent region ID
        schema:
          type: string
          format: uuid
      - in: query
        name: type
        description: Filter by region type
        schema:
          type: string
          enum: [continent, country, state, province, city, town, village, district, neighborhood, geographical]
      - in: query
        name: climate
        description: Filter by region climate
        schema:
          type: string
          enum: [tropical, dry, temperate, continental, polar, alpine]
    responses:
      '200':
        description: A list of regions
        content:
          application/json:
            schema:
              $ref: './schemas.yaml#/RegionListResponse'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../common/shared.yaml#/components/schemas/ErrorResponse'

  post:
    summary: Create a new region
    tags:
      - Regions
    operationId: createRegion
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: './schemas.yaml#/RegionCreate'
    responses:
      '201':
        description: Region created successfully
        content:
          application/json:
            schema:
              $ref: './schemas.yaml#/RegionResponse'
      '400':
        description: Validation error
        content:
          application/json:
            schema:
              $ref: '../common/shared.yaml#/components/schemas/ErrorResponse'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../common/shared.yaml#/components/schemas/ErrorResponse'

/{id}:
  get:
    summary: Get a region by ID
    tags:
      - Regions
    operationId: getRegionById
    security:
      - bearerAuth: []
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '200':
        description: The region
        content:
          application/json:
            schema:
              $ref: './schemas.yaml#/RegionResponse'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../common/shared.yaml#/components/schemas/ErrorResponse'
      '404':
        description: Region not found
        content:
          application/json:
            schema:
              $ref: '../common/shared.yaml#/components/schemas/ErrorResponse'

  put:
    summary: Update a region by ID
    tags:
      - Regions
    operationId: updateRegion
    security:
      - bearerAuth: []
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
          format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: './schemas.yaml#/RegionUpdate'
    responses:
      '200':
        description: Region updated successfully
        content:
          application/json:
            schema:
              $ref: './schemas.yaml#/RegionResponse'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../common/shared.yaml#/components/schemas/ErrorResponse'
      '404':
        description: Region not found
        content:
          application/json:
            schema:
              $ref: '../common/shared.yaml#/components/schemas/ErrorResponse'

  delete:
    summary: Delete a region by ID
    tags:
      - Regions
    operationId: deleteRegion
    security:
      - bearerAuth: []
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '200':
        description: Region deleted successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                message:
                  type: string
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../common/shared.yaml#/components/schemas/ErrorResponse'
      '404':
        description: Region not found
        content:
          application/json:
            schema:
              $ref: '../common/shared.yaml#/components/schemas/ErrorResponse'
